<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Agentic Wallet</title>
    <style>
      :root { color-scheme: light dark; }
      * { box-sizing: border-box; }
      body {
        font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
        margin: 0; height: 100dvh; display: flex; flex-direction: column;
        max-width: 46rem; margin-inline: auto; padding: 0 1rem;
      }
      header { padding: 1rem 0 .5rem; border-bottom: 1px solid #8884; }
      header h1 { font-size: 1.1rem; margin: 0; }
      header p { margin: .25rem 0 0; opacity: .65; font-size: .8rem; }
      header a { color: inherit; }
      #mode { margin-top: .4rem; font-size: .75rem; }
      #remote-consent { display: none; font-size: .75rem; margin-top: .4rem; }
      #log { flex: 1; overflow-y: auto; padding: 1rem 0; display: flex; flex-direction: column; gap: .75rem; }
      .msg { max-width: 85%; padding: .55rem .8rem; border-radius: .8rem; white-space: pre-wrap; line-height: 1.45; }
      .user { align-self: flex-end; background: #3b82f6; color: #fff; border-bottom-right-radius: .2rem; }
      .bot { align-self: flex-start; background: #8882; border-bottom-left-radius: .2rem; }
      .data { align-self: flex-start; max-width: 100%; width: 100%; }
      .data table { border-collapse: collapse; width: 100%; font-size: .8rem; }
      .data th, .data td { text-align: left; padding: .25rem .5rem; border-bottom: 1px solid #8883; }
      .data code { font-size: .78rem; }
      .digest { opacity: .6; font-size: .72rem; word-break: break-all; margin-top: .3rem; }
      .suggestions { align-self: flex-start; display: flex; flex-wrap: wrap; gap: .4rem; }
      .suggestions button { padding: .4rem .65rem; border: 1px solid #3b82f688; background: transparent; color: inherit; font-size: .78rem; }
      form { display: flex; gap: .5rem; padding: .75rem 0 1rem; border-top: 1px solid #8884; }
      input { flex: 1; padding: .6rem .8rem; border-radius: .6rem; border: 1px solid #8886; background: transparent; color: inherit; font-size: .95rem; }
      button { padding: .6rem 1rem; border-radius: .6rem; border: none; background: #3b82f6; color: #fff; cursor: pointer; font-size: .95rem; }
    </style>
  </head>
  <body>
    <header>
      <h1>Agentic Wallet</h1>
      <p>Read-only demo · chat is the only interface · no signing, no key custody · <a href="/project">project map</a><span id="debug-nav"></span></p>
      <div id="mode">Checking inference mode…</div>
      <label id="remote-consent">
        <input id="allow-remote" type="checkbox" /> Allow this message to be processed remotely
      </label>
    </header>
    <div id="log"></div>
    <form id="form" autocomplete="off">
      <input id="input" placeholder="Ask about your portfolio, balances, allowances…" autofocus />
      <button type="submit">Send</button>
    </form>

    <script>
      const sessionId = "s-" + Math.random().toString(36).slice(2);
      const log = document.getElementById("log");
      let capabilities = { inference_location: "server-deterministic", remote_consent_required: false };

      function el(cls, html) {
        const d = document.createElement("div");
        d.className = cls;
        d.innerHTML = html;
        log.appendChild(d);
        log.scrollTop = log.scrollHeight;
        return d;
      }
      function esc(s) { return String(s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c])); }
      function amt(a) { return esc(a.base_units) + " <span style='opacity:.6'>(dec " + a.decimals + ")</span>"; }

      function renderData(d) {
        if (!d) return;
        if (d.type === "portfolio") {
          const p = d.portfolio;
          let rows = `<tr><td>base:native</td><td>${amt(p.native_balance)}</td></tr>` +
            p.token_balances.map(t => `<tr><td>${esc(t.asset_id)}</td><td>${amt(t.amount)}</td></tr>`).join("");
          el("data", `<table><tr><th>asset</th><th>base units</th></tr>${rows}</table>`);
        } else if (d.type === "balance") {
          el("data", `<table><tr><td>${esc(d.asset_id)}</td><td>${amt(d.amount)}</td></tr></table>`);
        } else if (d.type === "allowances") {
          if (!d.allowances.length) return;
          let rows = d.allowances.map(a => `<tr><td>${esc(a.asset_id)}</td><td>${esc(a.spender_id)}</td><td>${amt(a.amount)}</td></tr>`).join("");
          el("data", `<table><tr><th>asset</th><th>spender</th><th>amount</th></tr>${rows}</table>`);
        } else if (d.type === "registry") {
          let rows = d.entries.map(e => `<tr><td>${esc(e.asset_id)}</td><td>${esc(e.symbol)}</td><td><code>${esc(e.address)}</code></td></tr>`).join("");
          el("data", `<table><tr><th>id</th><th>symbol</th><th>address</th></tr>${rows}</table>
            <div class="digest">registry ${esc(d.version_digest)}</div>`);
        }
      }

      function renderSuggestions(items) {
        if (!items || !items.length) return;
        const row = document.createElement("div");
        row.className = "suggestions";
        for (const item of items) {
          const button = document.createElement("button");
          button.type = "button";
          button.textContent = item.label;
          button.addEventListener("click", () => send(item.prompt));
          row.appendChild(button);
        }
        log.appendChild(row);
        log.scrollTop = log.scrollHeight;
      }

      async function send(message) {
        el("msg user", esc(message));
        const r = await fetch("/chat", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            session_id: sessionId,
            message,
            allow_remote_inference: document.getElementById("allow-remote").checked,
          }),
        });
        const b = await r.json();
        if (capabilities.remote_consent_required) {
          document.getElementById("allow-remote").checked = false;
        }
        el("msg bot", esc(b.reply));
        renderData(b.data);
        renderSuggestions(b.suggested_actions);
      }

      document.getElementById("form").addEventListener("submit", e => {
        e.preventDefault();
        const input = document.getElementById("input");
        const msg = input.value.trim();
        if (!msg) return;
        input.value = "";
        send(msg);
      });

      el("msg bot", "Hi. I'm a read-only wallet assistant. Ask me to show your portfolio, a balance, allowances, or the registry.");
      fetch("/capabilities").then(r => r.json()).then(c => {
        capabilities = c;
        const remote = c.inference_location === "remote-model";
        const label = remote
          ? `Remote ${c.model_id || "model"} · wallet intent leaves this server only with consent`
          : c.inference_location === "server-model"
            ? `Server-hosted ${c.model_id || "model"} · target mobile checkpoint`
            : "Deterministic server fallback · no model inference";
        document.getElementById("mode").textContent = label;
        document.getElementById("remote-consent").style.display = remote ? "block" : "none";
        if (c.debug_transcripts) {
          const link = document.createElement("a");
          link.href = "/debug/transcripts";
          link.textContent = "debug transcript";
          document.getElementById("debug-nav").append(" · ", link);
        }
      });
    </script>
  </body>
</html>
